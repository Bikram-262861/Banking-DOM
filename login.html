<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banknig Login</title>
</head>
<body>

    <h1 class="text-3xl text-center mt-12">Welcome to DOM <span class="text-red-400 font-semibold">Banking Syestem!</span></h1>


    <section
            class="bg-red-100
            p-4 mt-12
            w-1/2 mx-auto 
            rounded 
            shadow-lg">
        <div 
            class="text-center">

            <p 
                class="font-medium 
                       text-2xl 
                       mb-4"
                       >
                       Please Login 
            </p>

            <input

                id="login_email"

                class="block 
                       w-1/2 
                       mx-auto 
                       p-3 
                       mb-4" 
                       type="text" 
                       placeholder="Enter your email ">


            <input

                id="login_password" 

                class="block 
                       w-1/2 
                       mx-auto 
                       p-3 
                       mb-4" 
                       type="text" 
                       placeholder="Enter your password">


            <button

                id="click_btn"

                class="inline-block
                       bg-red-400
                       px-4 py-2 
                       font-bold
                       text-white 
                       rounded 
                       hover:bg-red-500" 

            >login

            </button>
        </div>
    </section>
    


        <!-- tailwind cdn link -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./js/login.js"></script>
</body>
</html>
